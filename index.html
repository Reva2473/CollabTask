<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabTask</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .hidden-pane { display: none !important; }
        .priority-high { border-left-width: 4px; border-left-color: #ef4444; }
        .priority-medium { border-left-width: 4px; border-left-color: #f59e0b; }
        .priority-low { border-left-width: 4px; border-left-color: #10b981; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 font-bold text-2xl tracking-tight">
                    CollabTask
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-greeting" class="hidden-pane text-sm font-medium"></span>
                    <button id="logout-btn" class="hidden-pane bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-md text-sm font-medium transition-colors">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Auth View -->
        <div id="auth-view" class="max-w-md mx-auto mt-12 bg-white p-8 rounded-xl shadow-lg border border-slate-100">
            <div class="text-center mb-8">
                <h2 id="auth-title" class="text-3xl font-extrabold text-slate-900">Sign in to your account</h2>
                <p class="mt-2 text-sm text-slate-600">
                    Or <a href="#" id="toggle-auth" class="text-indigo-600 font-medium hover:text-indigo-500">register a new account</a>
                </p>
            </div>
            
            <form id="auth-form" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                    <input type="text" id="username" required class="mt-1 block w-full px-4 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                    <input type="password" id="password" required class="mt-1 block w-full px-4 py-2 border border-slate-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-shadow">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                    Sign in
                </button>
            </form>
            <div id="auth-error" class="mt-4 text-sm text-red-600 text-center hidden-pane"></div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="hidden-pane">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                
                <!-- Main Task Column -->
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-slate-800">My Tasks</h3>
                            <button id="show-task-modal-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                                + New Task
                            </button>
                        </div>
                        <div id="task-list" class="divide-y divide-slate-100 max-h-[600px] overflow-y-auto">
                            <!-- Tasks will be injected here -->
                            <div class="p-6 text-center text-slate-500 text-sm">Loading tasks...</div>
                        </div>
                    </div>
                </div>

                <!-- Sidebar: Groups & Actions -->
                <div class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="px-6 py-5 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-slate-800">My Groups</h3>
                            <button id="show-group-modal-btn" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-3 py-1.5 rounded-md text-sm font-medium transition-colors">
                                + Create
                            </button>
                        </div>
                        <div id="group-list" class="divide-y divide-slate-100 max-h-[400px] overflow-y-auto">
                            <!-- Groups injected here -->
                            <div class="p-6 text-center text-slate-500 text-sm">Loading groups...</div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </main>

    <!-- Modals -->
    <!-- Create Task Modal -->
    <div id="task-modal" class="hidden-pane fixed inset-0 z-10 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900 bg-opacity-75" aria-hidden="true" id="task-modal-bg"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <form id="task-form">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 space-y-4">
                        <h3 class="text-xl font-bold leading-6 text-slate-900 mb-4">Create New Task</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Title</label>
                            <input type="text" id="task-title" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Description</label>
                            <textarea id="task-desc" rows="3" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700">Due Date</label>
                                <input type="date" id="task-date" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700">Priority</label>
                                <select id="task-priority" class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm bg-white">
                                    <option value="Low">Low</option>
                                    <option value="Medium" selected>Medium</option>
                                    <option value="High">High</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Image URL (Optional)</label>
                            <input type="url" id="task-image" placeholder="https://..." class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                    </div>
                    <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-slate-200">
                        <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm transition-colors">Save Task</button>
                        <button type="button" id="close-task-modal-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Create Group Modal -->
    <div id="group-modal" class="hidden-pane fixed inset-0 z-10 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900 bg-opacity-75" aria-hidden="true" id="group-modal-bg"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg w-full">
                <form id="group-form">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 space-y-4">
                        <h3 class="text-xl font-bold leading-6 text-slate-900 mb-4">Create New Group</h3>
                        <div>
                            <label class="block text-sm font-medium text-slate-700">Group Name</label>
                            <input type="text" id="group-name" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        </div>
                    </div>
                    <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-slate-200">
                        <button type="submit" class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-indigo-600 text-base font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:ml-3 sm:w-auto sm:text-sm transition-colors">Create</button>
                        <button type="button" id="close-group-modal-btn" class="mt-3 w-full inline-flex justify-center rounded-md border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>
</html>
